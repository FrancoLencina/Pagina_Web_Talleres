<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Registrar Taller</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
  <nav class="barra-buscador">
    <h1 id="tituloHome" class="titulo-buscador">Talleres Culturales</h1>
  </nav>
  <div class="formulario">
    <h1>Registrar Taller</h1>

    <div id="preview-container"></div>
    <button id="btn-home" class="oculto">Volver al inicio</button>

    <form id="formRegistro">

      <input id="nombre" type="text" placeholder="Nombre del taller" required />

      <input id="profesor" type="text" placeholder="Profesor" required />

      <input id="descripcion" placeholder="Descripción" required />

      <input id="rubro" type="text" placeholder="Rubro" required />

      <input id="telefono" type="number" placeholder="Número de teléfono" required />

      <input id="redes" type="text" placeholder="Redes sociales" />

      <input id="direccion" type="text" placeholder="Dirección" required />

      <label>Imagen del taller</label>
      <input type="file" id="imagen" accept="image/*" />

      <button type="submit">Enviar</button>

    </form>
  </div>
  <script src="registro.js"></script>
</body>

</html>
