<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>TALLERES EL HOMERO CHINO</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>
<body>
    <nav class="barra-buscador">
        <h1 class="titulo-buscador">Talleres Culturales</h1>

        <input type="text"  id="buscador"  placeholder="Buscar talleres..." class="buscador">

        <button id="btnRegistro" class="boton-buscador"> Registrar Taller </button>
    </nav>
    <h1 id="encabezado">Talleres Culturales</h1>
    <main class="contenedor-talleres">

        <div class="taller-card">
            <h2>Taller de pintura</h2>
            <h3>Profesora Perez</h3>
            <img src="taller-de-pintura.jpg" alt="Taller">
            <p>Aprendé técnicas de pintura artística para principiantes.</p>
        </div>

        <div class="taller-card">
            <h2>Taller de Guitarra</h2>
            <h3>Profesor Juarez</h3>
            <img src="taller-de-guitarra.jpg" alt="Taller">
            <p>Clases básicas para empezar a tocar desde cero.</p>
        </div>

        <div class="taller-card">
            <h2>Taller de Danza</h2>
            <h3>Profesor Lopez</h3>
            <img src="taller-de-danza.jpg" alt="Taller">
            <p>Expresión corporal y coreografías modernas.</p>
        </div>
        
    </main>
</body>
</html>
