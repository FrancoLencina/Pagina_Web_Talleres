<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>TALLERES EL HOMERO CHINO</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>
<body>
    <h1 id="encabezado">HOMERO CHINO</h1>
    <div class="contenedor">
        <article class="seccion">
            <h3>REGISTRARSE</h3>
            <form action="#">
                <label for="campo_nombre">Nombre</label>
                <br>
                <input id="campo_nombre" name="nombre" type="text">
                <br>
                <label for="campo_apellido">Apellido</label>
                <br>
                <input id="campo_apellido" name="apellido" type="text">
                <br>
                <label for="campo_mail">Correo electrónico</label>
                <br>
                <input id="campo_mail" name="mail" type="text">
                <br>
                <label for="campo_telefono">Teléfono</label>
                <br>
                <input id="campo_telefono" name="telefono" type="text">
                <br>
                <label for="campo_contraseña">Contraseña</label>
                <br>
                <input id="campo_contraseña" name="contraseña" type="password">
                <br>
                <br>
                <input type="submit" value="enviar comentario">
            </form>
        </article>
        <article class="seccion">
            <img src="homerochino.webp" width="256" height="256" alt="hola soy homero chino">
        </article>
        
    </div>
    
</body>
</html>
